<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Photobooth Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="screen-capture">
            <h1>Souriez ! 📸</h1>
            <div class="camera-container">
                <video id="video" autoplay playsinline muted></video>
                <img src="cadre.png" id="frame-overlay" alt="Cadre">
            </div>
            <button id="snap" class="btn-main">Prendre la photo</button>
        </div>

        <div id="screen-result" style="display:none;">
            <h1>Magnifique ! ✨</h1>
            <div class="result-box">
                <img id="photo-result" src="" alt="Résultat">
            </div>
            <div class="button-group">
                <a id="download-link" download="ma-photo.png" class="btn-download">Télécharger</a>
                <button id="retake" class="btn-secondary">Refaire une photo</button>
            </div>
        </div>

        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
